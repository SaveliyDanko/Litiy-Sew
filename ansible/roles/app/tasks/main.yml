---
# ── 1. Локальные сборки (не на VPS — экономит RAM на маленьких серверах) ─────

- name: Собрать backend (./gradlew bootJar) на локальной машине
  delegate_to: localhost
  become: no
  command: ./gradlew bootJar --no-daemon
  args:
    chdir: "{{ playbook_dir }}/../backend"
  changed_when: true

- name: Найти собранный jar
  delegate_to: localhost
  become: no
  find:
    paths: "{{ playbook_dir }}/../backend/build/libs"
    patterns: "*.jar"
    excludes: "*-plain.jar"
  register: backend_jar

- name: Проверить что jar найден
  assert:
    that: backend_jar.files | length > 0
    fail_msg: "build/libs/*.jar не найден после bootJar. Запусти `./gradlew bootJar` вручную и проверь логи."

- name: Установить зависимости frontend на локальной машине
  delegate_to: localhost
  become: no
  command: npm ci
  args:
    chdir: "{{ playbook_dir }}/../frontend"
  changed_when: true

- name: Собрать frontend на локальной машине
  delegate_to: localhost
  become: no
  command: npm run build
  args:
    chdir: "{{ playbook_dir }}/../frontend"
  environment:
    VITE_SHOP_ENABLED: "{{ vite_shop_enabled }}"
  changed_when: true

# ── 2. Синхронизация backend (только Dockerfile + jar) ──────────────────────

- name: Создать backend/build/libs на VPS
  file:
    path: "{{ app_dir }}/backend/build/libs"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Удалить старые jar на VPS (на случай если осталось от прошлой сборки)
  shell: rm -f {{ app_dir }}/backend/build/libs/*.jar
  changed_when: true

- name: Скопировать Dockerfile на VPS
  copy:
    src: "{{ playbook_dir }}/../backend/Dockerfile"
    dest: "{{ app_dir }}/backend/Dockerfile"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Скопировать .dockerignore на VPS
  copy:
    src: "{{ playbook_dir }}/../backend/.dockerignore"
    dest: "{{ app_dir }}/backend/.dockerignore"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Скопировать собранный jar на VPS
  copy:
    src: "{{ item.path }}"
    dest: "{{ app_dir }}/backend/build/libs/{{ item.path | basename }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"
  loop: "{{ backend_jar.files }}"

- name: Создать frontend/dist на VPS
  file:
    path: "{{ app_dir }}/frontend/dist"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Синхронизировать собранный frontend dist на VPS
  synchronize:
    src: "{{ playbook_dir }}/../frontend/dist/"
    dest: "{{ app_dir }}/frontend/dist/"
    delete: yes
  notify: Reload nginx

# Миграции лежат в classpath приложения (src/main/resources/db/changelog/),
# их прогоняет Liquibase автоматически при старте бэкенда — никаких ручных
# psql -f больше не нужно.

- name: Синхронизировать docker-compose.prod.yml
  copy:
    src: "{{ playbook_dir }}/../docker-compose.prod.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

# ── 2. Production .env ────────────────────────────────────────────────────────

- name: Развернуть .env из шаблона
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

# ── 3. Права на директорию ───────────────────────────────────────────────────

- name: Установить владельца app_dir
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Создать папку uploads
  file:
    path: "{{ uploads_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "www-data"
    mode: "2750"

- name: Дать Nginx доступ к существующим папкам uploads
  command: find {{ uploads_dir }} -type d -exec chmod 2750 {} +
  changed_when: true

- name: Дать Nginx доступ к существующим файлам uploads
  command: find {{ uploads_dir }} -type f -exec chmod 0640 {} +
  changed_when: true

- name: Назначить группу www-data для uploads
  command: chgrp -R www-data {{ uploads_dir }}
  changed_when: true

- name: Добавить app_user в группу www-data (для записи Spring Boot)
  user:
    name: "{{ app_user }}"
    groups: www-data
    append: yes

# ── 4. Запуск сервисов через Docker Compose ───────────────────────────────────

- name: Пересобрать backend image без кеша
  command: docker compose -f docker-compose.yml build --no-cache backend
  args:
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"
  changed_when: true

- name: Запустить (или пересобрать) backend через docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - docker-compose.yml
    state: present
    build: never
    pull: missing
  become_user: "{{ app_user }}"
  notify: Reload nginx

# ── 6. Admin-пользователь ─────────────────────────────────────────────────────

- name: Установить python3-bcrypt
  apt:
    name: python3-bcrypt
    state: present

- name: Создать или обновить admin-пользователя через Python
  shell: |
    python3 - << 'PYEOF'
    import bcrypt, os, subprocess
    email = os.environ['ADMIN_EMAIL']
    pw    = os.environ['ADMIN_PW'].encode()
    h     = bcrypt.hashpw(pw, bcrypt.gensalt(12)).decode()
    sql   = (
        "INSERT INTO users (email, password_hash, email_verified, role, created_at) "
        f"VALUES ('{email}', '{h}', true, 'ADMIN', NOW()) "
        "ON CONFLICT (email) DO UPDATE "
        "SET password_hash = EXCLUDED.password_hash, "
        "    role = 'ADMIN', email_verified = true;"
    )
    subprocess.run(
        ["docker", "compose", "-f", "{{ app_dir }}/docker-compose.yml",
         "exec", "-T", "postgres", "psql", "-U", "{{ postgres_user }}", "-d", "{{ postgres_db }}"],
        input=sql, text=True, check=True
    )
    PYEOF
  environment:
    ADMIN_EMAIL: "{{ admin_email }}"
    ADMIN_PW:    "{{ admin_password }}"
  become_user: "{{ app_user }}"
  no_log: true
  changed_when: true
