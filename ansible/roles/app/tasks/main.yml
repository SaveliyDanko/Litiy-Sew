---
# ── 1. Сборка backend локально (jar, не на VPS — экономит 10+ мин и RAM) ─────

- name: Собрать backend (./gradlew bootJar) на локальной машине
  delegate_to: localhost
  become: no
  command: ./gradlew bootJar --no-daemon
  args:
    chdir: "{{ playbook_dir }}/../backend"
  changed_when: true

- name: Найти собранный jar
  delegate_to: localhost
  become: no
  find:
    paths: "{{ playbook_dir }}/../backend/build/libs"
    patterns: "*.jar"
    excludes: "*-plain.jar"
  register: backend_jar

- name: Проверить что jar найден
  assert:
    that: backend_jar.files | length > 0
    fail_msg: "build/libs/*.jar не найден после bootJar. Запусти `./gradlew bootJar` вручную и проверь логи."

# ── 2. Синхронизация backend (только Dockerfile + jar) ──────────────────────

- name: Создать backend/build/libs на VPS
  file:
    path: "{{ app_dir }}/backend/build/libs"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Удалить старые jar на VPS (на случай если осталось от прошлой сборки)
  shell: rm -f {{ app_dir }}/backend/build/libs/*.jar
  changed_when: true

- name: Скопировать Dockerfile на VPS
  copy:
    src: "{{ playbook_dir }}/../backend/Dockerfile"
    dest: "{{ app_dir }}/backend/Dockerfile"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

- name: Скопировать собранный jar на VPS
  copy:
    src: "{{ item.path }}"
    dest: "{{ app_dir }}/backend/build/libs/{{ item.path | basename }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"
  loop: "{{ backend_jar.files }}"

- name: Проверить наличие папки migrations на локалке
  delegate_to: localhost
  become: no
  stat:
    path: "{{ playbook_dir }}/../backend/migrations"
  register: backend_migrations_present

- name: Скопировать SQL-миграции на VPS (для ручного запуска при апдейте схемы)
  synchronize:
    src: "{{ playbook_dir }}/../backend/migrations/"
    dest: "{{ app_dir }}/backend/migrations/"
    delete: yes
  when: backend_migrations_present.stat.exists

- name: Синхронизировать frontend на VPS
  synchronize:
    src: "{{ playbook_dir }}/../frontend/"
    dest: "{{ app_dir }}/frontend/"
    delete: yes
    rsync_opts:
      - "--exclude=node_modules/"
      - "--exclude=dist/"

- name: Синхронизировать docker-compose.prod.yml
  copy:
    src: "{{ playbook_dir }}/../docker-compose.prod.yml"
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0644"

# ── 2. Production .env ────────────────────────────────────────────────────────

- name: Развернуть .env из шаблона
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

# ── 3. Права на директорию ───────────────────────────────────────────────────

- name: Установить владельца app_dir
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Создать папку uploads
  file:
    path: "{{ uploads_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "www-data"
    mode: "0750"

- name: Добавить app_user в группу www-data (для записи Spring Boot)
  user:
    name: "{{ app_user }}"
    groups: www-data
    append: yes

# ── 4. Сборка frontend ────────────────────────────────────────────────────────

- name: Установить Node.js (если отсутствует)
  apt:
    name:
      - nodejs
      - npm
    state: present

- name: Установить зависимости frontend
  community.general.npm:
    path: "{{ app_dir }}/frontend"
    ci: yes
  become_user: "{{ app_user }}"

- name: Собрать frontend
  command: npm run build
  args:
    chdir: "{{ app_dir }}/frontend"
  environment:
    VITE_SHOP_ENABLED: "{{ vite_shop_enabled }}"
  become_user: "{{ app_user }}"
  notify: Reload nginx

# ── 5. Запуск сервисов через Docker Compose ───────────────────────────────────

- name: Запустить (или пересобрать) backend через docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    files:
      - docker-compose.yml
    state: present
    build: always
    pull: missing
  become_user: "{{ app_user }}"
  notify: Reload nginx

# ── 6. Admin-пользователь ─────────────────────────────────────────────────────

- name: Установить python3-bcrypt
  apt:
    name: python3-bcrypt
    state: present

- name: Создать или обновить admin-пользователя через Python
  shell: |
    python3 - << 'PYEOF'
    import bcrypt, os, subprocess
    email = os.environ['ADMIN_EMAIL']
    pw    = os.environ['ADMIN_PW'].encode()
    h     = bcrypt.hashpw(pw, bcrypt.gensalt(12)).decode()
    sql   = (
        "INSERT INTO users (email, password_hash, email_verified, role, created_at) "
        f"VALUES ('{email}', '{h}', true, 'ADMIN', NOW()) "
        "ON CONFLICT (email) DO UPDATE "
        "SET password_hash = EXCLUDED.password_hash, "
        "    role = 'ADMIN', email_verified = true;"
    )
    subprocess.run(
        ["docker", "compose", "-f", "{{ app_dir }}/docker-compose.yml",
         "exec", "-T", "postgres", "psql", "-U", "{{ postgres_user }}", "-d", "{{ postgres_db }}"],
        input=sql, text=True, check=True
    )
    PYEOF
  environment:
    ADMIN_EMAIL: "{{ admin_email }}"
    ADMIN_PW:    "{{ admin_password }}"
  become_user: "{{ app_user }}"
  no_log: true
  changed_when: true

