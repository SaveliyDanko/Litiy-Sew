---
- name: Добавить GPG ключ Docker
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Добавить репозиторий Docker
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Установить Docker Engine и Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Добавить пользователя приложения в группу docker
  user:
    name: "{{ app_user }}"
    groups: docker
    append: yes

- name: Убедиться что Docker запущен и включён
  service:
    name: docker
    state: started
    enabled: yes
