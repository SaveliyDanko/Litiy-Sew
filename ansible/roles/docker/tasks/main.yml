---
- name: Создать директорию для GPG ключей
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Скачать GPG ключ Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: no

- name: Добавить репозиторий Docker
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Установить Docker Engine и Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Добавить пользователя приложения в группу docker
  user:
    name: "{{ app_user }}"
    groups: docker
    append: yes

- name: Убедиться что Docker запущен и включён
  service:
    name: docker
    state: started
    enabled: yes
