# --- Общие пути ---
app_dir: /opt/litiy-sew
app_user: litiy-sew
uploads_dir: /opt/litiy-sew/uploads

# --- Домен и SSL ---
domain: litiy.site
certbot_email: dankosaveliy.m@gmail.com

# --- Порты (внутренние, за nginx) ---
backend_port: 8080
postgres_port: 5433
redis_port: 6379

# --- Frontend ---
vite_shop_enabled: "false"

# --- PostgreSQL ---
postgres_user: postgres
postgres_db: litiy_sew
# postgres_password — в ansible/vault.yml (зашифровано)

# --- Media ---
media_public_url: "/media"

# --- Mail ---
mail_host: smtp.gmail.com
mail_port: 587
app_mail_console_fallback_enabled: "false"
# mail_username, mail_password, mail_from — в vault.yml

# --- CORS ---
cors_allowed_origins: "https://{{ domain }},http://localhost:5173"
