---
# Быстрый re-deploy без повторного provision (docker + nginx не трогается)
- name: Re-deploy LitiySew
  hosts: vps
  become: yes
  tasks:
    - name: Синхронизировать backend
      synchronize:
        src: "{{ playbook_dir }}/../backend/"
        dest: "{{ app_dir }}/backend/"
        delete: yes
        rsync_opts:
          - "--exclude=build/"
          - "--exclude=.gradle/"
          - "--exclude=*.class"

    - name: Синхронизировать frontend
      synchronize:
        src: "{{ playbook_dir }}/../frontend/"
        dest: "{{ app_dir }}/frontend/"
        delete: yes
        rsync_opts:
          - "--exclude=node_modules/"
          - "--exclude=dist/"

    - name: Обновить .env
      template:
        src: roles/app/templates/env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    - name: Собрать frontend
      command: npm run build
      args:
        chdir: "{{ app_dir }}/frontend"
      environment:
        VITE_SHOP_ENABLED: "{{ vite_shop_enabled }}"
      become_user: "{{ app_user }}"

    - name: Пересобрать и перезапустить backend
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - docker-compose.yml
        state: present
        build: always
        pull: missing
      become_user: "{{ app_user }}"

    - name: Перезагрузить Nginx
      service:
        name: nginx
        state: reloaded

    - name: Установить python3-bcrypt
      apt:
        name: python3-bcrypt
        state: present

    - name: Создать или обновить admin-пользователя
      shell: |
        python3 - << 'PYEOF'
        import bcrypt, os, subprocess
        email = os.environ['ADMIN_EMAIL']
        pw    = os.environ['ADMIN_PW'].encode()
        h     = bcrypt.hashpw(pw, bcrypt.gensalt(12)).decode()
        sql   = (
            "INSERT INTO users (email, password_hash, email_verified, role, created_at) "
            f"VALUES ('{email}', '{h}', true, 'ADMIN', NOW()) "
            "ON CONFLICT (email) DO UPDATE "
            "SET password_hash = EXCLUDED.password_hash, "
            "    role = 'ADMIN', email_verified = true;"
        )
        subprocess.run(
            ["docker", "compose", "-f", "{{ app_dir }}/docker-compose.yml",
             "exec", "-T", "postgres", "psql", "-U", "{{ postgres_user }}", "-d", "{{ postgres_db }}"],
            input=sql, text=True, check=True
        )
        PYEOF
      environment:
        ADMIN_EMAIL: "{{ admin_email }}"
        ADMIN_PW:    "{{ admin_password }}"
      become_user: "{{ app_user }}"
      no_log: true
      changed_when: true
