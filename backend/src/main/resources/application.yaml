spring:
  application:
    name: LitiySew

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:litiy_sew}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_SHOW_SQL:false}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

spring.servlet.multipart:
  max-file-size: 20MB
  max-request-size: 20MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    verification-subject: "Код подтверждения LitiySew"
    login-subject: "Код для входа в LitiySew"
    console-fallback-enabled: ${APP_MAIL_CONSOLE_FALLBACK_ENABLED:false}
  auth:
    code:
      length: 6
      ttl: 10m
      max-attempts: 5
      resend-cooldown: 60s
  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:/opt/litiy-sew/uploads}
    public-url: ${MEDIA_PUBLIC_URL:http://localhost:8080/media}
