spring:
  application:
    name: LitiySew

  datasource:
    url: jdbc:postgresql://localhost:5432/litiy_sew
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:strongpassword}
  bucket: ${MINIO_BUCKET:litiy-sew-media}

app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    verification-subject: "Код подтверждения LitiySew"
    login-subject: "Код для входа в LitiySew"
  auth:
    code:
      length: 6
      ttl: 10m
      max-attempts: 5
      resend-cooldown: 60s
